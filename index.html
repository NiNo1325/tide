<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>tide</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04141f">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --abyss:#04141f; --deep:#073049; --foam:#eafbff; --gold:#ffd98a;
    --accent:#36d6c3;
    --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden;background:var(--abyss);color:var(--foam);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  #c{position:fixed;inset:0;display:block;width:100vw;height:100vh;touch-action:none;z-index:0}

  .screen{position:fixed;inset:0;z-index:2;display:none;flex-direction:column;
    align-items:center;justify-content:safe center;text-align:center;padding:max(28px,7vh) 22px;
    pointer-events:none;overflow-y:auto}
  .screen.on{display:flex}
  .screen>*{pointer-events:auto;flex:none}

  .brand{font-weight:200;letter-spacing:.22em;text-indent:.22em;line-height:.9;
    color:var(--foam);text-shadow:0 0 40px color-mix(in srgb,var(--accent) 55%,transparent)}
  .brand.xl{font-size:clamp(58px,20vw,150px)}
  .brand.sm{font-size:clamp(30px,9vw,46px);margin-bottom:6px}

  .sub{font-weight:300;color:#bfeef0;line-height:1.5;max-width:30ch}
  .eyebrow{font-weight:600;font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--accent);margin-bottom:14px}

  .btn{pointer-events:auto;border:1px solid var(--line);background:var(--card);
    color:var(--foam);font-size:16px;font-weight:500;letter-spacing:.02em;
    padding:15px 26px;border-radius:14px;cursor:pointer;transition:.15s;
    backdrop-filter:blur(6px);min-width:200px}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--accent);color:#04141f;border-color:var(--accent);font-weight:700;
    box-shadow:0 8px 30px color-mix(in srgb,var(--accent) 35%,transparent)}
  .btn.ghost{min-width:0;padding:11px 18px;font-size:14px;color:#9fdedb;background:transparent}
  .btn.wide{width:100%;max-width:380px}

  .stack{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:420px}
  .selrow{display:flex;gap:12px;width:100%;max-width:420px;margin:22px 0 26px}
  .selcard{flex:1;pointer-events:auto;border:1px solid var(--line);background:var(--card);
    border-radius:16px;padding:14px;cursor:pointer;text-align:left;transition:.15s}
  .selcard:active{transform:scale(.97)}
  .selcard .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7fd9d2}
  .selcard .val{font-size:19px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:8px}
  .swatch{width:11px;height:11px;border-radius:50%;display:inline-block}

  .cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:440px;margin-top:8px}
  .opt{pointer-events:auto;display:flex;align-items:center;gap:14px;text-align:left;
    border:1px solid var(--line);background:var(--card);border-radius:16px;padding:16px;
    cursor:pointer;transition:.15s}
  .opt:active{transform:scale(.98)}
  .opt.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
  .opt .dot{width:14px;height:14px;border-radius:50%;flex:none;border:2px solid var(--accent)}
  .opt.sel .dot{background:var(--accent)}
  .opt .ot{font-size:18px;font-weight:600}
  .opt .od{font-size:13px;color:#9fdedb;margin-top:3px;line-height:1.35}
  .opt .meter{display:flex;gap:3px;margin-top:7px}
  .opt .meter i{width:18px;height:4px;border-radius:2px;background:rgba(255,255,255,.16)}
  .opt .meter i.on{background:var(--accent)}
  .opt.locked{opacity:.5;filter:grayscale(.6)}
  .opt.locked .ot{color:#9fb4b8}
  .opt .play{margin-left:auto;flex:none}
  .opt .play .btn{min-width:0;padding:9px 14px;font-size:13px}

  .chip{position:fixed;top:max(14px,3vh);right:16px;z-index:3;pointer-events:auto;
    display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;
    backdrop-filter:blur(6px)}
  .chip .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#04141f;
    display:grid;place-items:center;font-weight:700;font-size:12px}

  .field{width:100%;max-width:380px;text-align:left;margin:7px 0}
  .field label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#7fd9d2}
  .field input{width:100%;margin-top:6px;background:rgba(0,0,0,.25);border:1px solid var(--line);
    border-radius:12px;padding:13px 14px;color:var(--foam);font-size:16px;-webkit-user-select:text;user-select:text}
  .field input:focus{outline:none;border-color:var(--accent)}

  .note{font-size:12px;color:#7fb9bd;line-height:1.5;max-width:34ch;margin-top:14px}
  .big-score{font-weight:700;font-size:clamp(70px,25vw,140px);line-height:1;
    font-variant-numeric:tabular-nums}
  .row{font-weight:300;font-size:15px;letter-spacing:.08em;color:#9fdedb;margin-top:10px}
  .row b{font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
  .result{font-weight:700;font-size:20px;letter-spacing:.04em;margin:6px 0}
  .win{color:#7CFFB2} .lose{color:#ff9a8a}

  .stats{width:100%;max-width:420px;margin-top:4px}
  .stats .r{display:flex;justify-content:space-between;padding:10px 2px;border-bottom:1px solid var(--line);
    font-size:14px}
  .stats .r .k{color:#bfeef0} .stats .r .v{font-weight:700;font-variant-numeric:tabular-nums}

  /* Conteneurs dynamiques : colonne centrée à largeur cohérente */
  #profileBody,#challengeBody,#leaderboardBody{display:flex;flex-direction:column;
    align-items:center;width:100%;max-width:440px;margin:0 auto}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:5;
    background:#0a2a3a;border:1px solid var(--line);border-radius:12px;padding:12px 18px;
    font-size:14px;opacity:0;transition:.25s;pointer-events:none;max-width:88vw}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  .cue{font-weight:500;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
    animation:breathe 2.2s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.45}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.cue{animation:none;opacity:.8}}
  .sp{height:18px}
  .screen [data-back]{margin-top:16px;flex:none}
  .ban{display:flex;align-items:center;gap:10px;background:color-mix(in srgb,var(--accent) 16%,transparent);
    border:1px solid var(--accent);border-radius:14px;padding:12px 16px;font-size:14px;max-width:420px;margin-bottom:18px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- profile chip -->
<div id="chip" class="chip" style="display:none"><span class="av" id="chipAv">?</span><span id="chipName">Invité</span></div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="brand xl">tide</div>

  <div class="stack">
    <button class="btn primary wide" id="voyageBtn">⛵ Voyage</button>
    <button class="btn wide" id="playBtn">Jeu libre</button>
    <div class="sp"></div>
    <button class="btn ghost" id="openChallenge">⚡ J'ai un code de défi</button>

<!-- FREE PLAY -->

  <div class="eyebrow">jeu libre</div>

  <div class="selrow">
    <div class="selcard" id="pickTrack">
      <div class="lab">musique</div>

    </div>

    <button class="btn primary wide" id="freePlayBtn">Jouer</button>

  </div>
  <div class="sp"></div>
  <button class="btn ghost" data-back>‹ Retour</button>
</div>

<!-- DIFFICULTY -->
<div id="diffScreen" class="screen">
  <div class="eyebrow">difficulté</div>
  <div class="brand sm">choisis ton flot</div>
  <div class="cards" id="diffCards"></div>
  <div class="sp"></div>
  <button class="btn ghost" data-back="free">‹ Retour</button>
</div>

<!-- TRACKS -->
<div id="trackScreen" class="screen">
  <div class="eyebrow">musique</div>
  <div class="brand sm">choisis ta vague</div>
  <div class="cards" id="trackCards"></div>
  <div class="sp"></div>
  <button class="btn ghost" data-back="free">‹ Retour</button>
</div>

<!-- PROFILE -->
<div id="profileScreen" class="screen">
  <div class="eyebrow">profil</div>
  <div id="profileBody"></div>
  <div class="sp"></div>
  <button class="btn ghost" data-back>‹ Retour</button>
</div>

<!-- CHALLENGE INCOMING -->
<div id="challengeScreen" class="screen">
  <div class="eyebrow">défi reçu</div>
  <div id="challengeBody"></div>
  <div class="sp"></div>
  <button class="btn ghost" data-back>‹ Retour</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardScreen" class="screen">
  <div class="eyebrow">classement d'amis</div>
  <div class="brand sm" id="lbTitle">classement</div>
  <div id="leaderboardBody" style="width:100%;max-width:440px"></div>
  <div class="sp"></div>
  <button class="btn ghost" data-back>‹ Retour</button>
</div>

<!-- GAME OVER -->
<div id="over" class="screen">
  <div class="eyebrow" id="overTitle">la vague s'est brisée</div>
  <div id="overResult"></div>
  <div class="big-score" id="finalScore">0</div>
  <div class="row" id="overSub">record&nbsp;<b id="bestScore">0</b></div>
  <div class="sp"></div>
  <div class="stack">
    <button class="btn primary wide" id="retryBtn">Rejouer</button>
    <button class="btn wide" id="challengeFriendBtn">⚡ Défier un ami</button>
    <button class="btn ghost" id="menuBtn">Menu</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<button id="mapBack" class="btn ghost" style="position:fixed;left:16px;bottom:18px;z-index:6;display:none">‹ Retour</button>

<script>
"use strict";
console.log('%c tide v3 — ok ','background:#36d6c3;color:#04141f;font-weight:bold');

/* ================= DOM ================= */
const $=id=>document.getElementById(id);
const canvas=$('c'), ctx=canvas.getContext('2d');
const screens={home:$('home'),free:$('freeScreen'),diff:$('diffScreen'),track:$('trackScreen'),
  profile:$('profileScreen'),challenge:$('challengeScreen'),leaderboard:$('leaderboardScreen'),over:$('over')};

/* ================= LAYOUT ================= */
let W=0,H=0,DPR=1,CONTACT_X,BASE_Y,BEAT_PX,ARC_H,WAVE_AMP;
function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  CONTACT_X=W*0.30;BASE_Y=H*0.60;BEAT_PX=Math.max(80,W*0.17);
  ARC_H=H*0.17;WAVE_AMP=Math.min(40,H*0.05);
}
let mapView=false,mapWorld=0,mapCur=0,mapAnim=null;
let camX=0,camY=0,mapParts=[];
// positions normalisées (0..1) des 11 îles sur worldmap.png — à ajuster île par île
const MAP_NODES=[[0.14,0.53],[0.09,0.66],[0.26,0.62],[0.30,0.46],[0.36,0.33],[0.47,0.45],[0.55,0.33],[0.62,0.50],[0.72,0.40],[0.80,0.55],[0.88,0.45]];
const mapImg=new Image();let mapImgReady=false;
mapImg.onload=()=>{mapImgReady=true;if(mapView)mapCenterCam();};
mapImg.src='assets/worldmap.png';
window.addEventListener('resize',layout);layout();

/* ================= HELPERS ================= */
function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(a,b,t){const pa=hexToRgb(a),pb=hexToRgb(b);const c=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));return `rgb(${c[0]},${c[1]},${c[2]})`;}
let ACC=[54,214,195];
function setAccent(hex){ACC=hexToRgb(hex);document.documentElement.style.setProperty('--accent',hex);}

/* surfeur pixel art : rasterisé une fois en 32×32, dessiné sans lissage (pixels nets) */
const surferImg=new Image();let surferReady=false,surferBuf=null;
surferImg.onload=()=>{try{surferBuf=document.createElement('canvas');surferBuf.width=32;surferBuf.height=32;
  const bc=surferBuf.getContext('2d');bc.imageSmoothingEnabled=false;bc.drawImage(surferImg,0,0,32,32);surferReady=true;}catch(e){}};
surferImg.src='assets/surfer.svg';
const SURFER_GAME=45,SURFER_MAP=30;   // tailles à l'écran (réglables)
function drawSurfer(cx,cy,size){
  if(!surferReady){ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fillStyle='#eafbff';ctx.fill();return;}
  const prev=ctx.imageSmoothingEnabled;ctx.imageSmoothingEnabled=false;
  ctx.drawImage(surferBuf,Math.round(cx-size/2),Math.round(cy-size/2),size,size);
  ctx.imageSmoothingEnabled=prev;
}

/* ================= PERSISTENCE ================= */
const store={
  async get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  async set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};
let profiles={},currentId=null,sessionBest={};
async function loadProfiles(){
  try{const p=await store.get('tide_profiles');profiles=p?JSON.parse(p):{};}catch(e){profiles={};}
  const c=await store.get('tide_current');currentId=(c&&profiles[c])?c:null;
}
async function persist(){await store.set('tide_profiles',JSON.stringify(profiles));await store.set('tide_current',currentId||'');}
async function syncFromCloud(){
  if(!window.tideFb || !window.tideFb.user) return;
  const p = curProfile(); if(!p) return;
  try{
    await window.tideFb.ensureUser();
    const cloud = await window.tideFb.fetchMyScores();
    // Fusion : le meilleur score gagne ; on ré-uploade ce que le cloud ne connaît pas.
    for(const key in cloud){
      const c = cloud[key], l = p.stats[key]||{best:0,plays:0,pct:0,cleared:false,stars:0};
      p.stats[key] = { best:Math.max(c.best,l.best), plays:Math.max(c.plays,l.plays),
        pct:Math.max(c.pct||0,l.pct||0), cleared:!!(c.cleared||l.cleared), stars:Math.max(c.stars||0,l.stars||0) };
    }
    for(const key in p.stats){
      const l = p.stats[key], c = cloud[key];
      if(!c || l.best>c.best || (l.pct||0)>(c.pct||0)){ const [ti,di]=key.split('|').map(Number);
        await window.tideFb.saveScore(ti,di,l.best,l.plays,l.pct||0,l.cleared||false,l.stars||0); }
    }
    await persist();
    refreshHome();
  }catch(e){ console.warn('syncFromCloud', e); }
}
function wireAuth(){
  if(!window.tideFb) return;
  window.tideFb.onChange(async (u)=>{
    if (u){
      const prevId = currentId;
      const id = 'g_'+u.uid;
      if (!profiles[id]) profiles[id] = { id, name:(u.displayName||'Joueur').slice(0,20), email:(u.email||''), uid:u.uid, created:Date.now(), stats:{}, history:[] };
      else { profiles[id].name=(u.displayName||profiles[id].name); profiles[id].email=(u.email||profiles[id].email); }
      // fusionne la progression locale (Invité) dans le compte Google
      if (prevId && prevId!==id && profiles[prevId]) mergeStats(profiles[id], profiles[prevId]);
      currentId = id; await persist();
      await syncFromCloud();
    } else {
      ensureLocalProfile();   // déconnecté → on retombe sur le profil local
    }
    refreshHome(); buildProfile();
  });
}
function curProfile(){return currentId?profiles[currentId]:null;}
function ensureLocalProfile(){
  // Profil local par défaut : la progression est sauvegardée sur l'appareil sans connexion.
  if(currentId && profiles[currentId]) return currentId;
  if(!profiles['local']) profiles['local']={id:'local',name:'Invité',email:'',created:Date.now(),stats:{},history:[]};
  currentId='local';persist();return currentId;
}
function mergeStats(dst,src){
  if(!src||!src.stats) return;
  for(const k in src.stats){const a=dst.stats[k]||{best:0,plays:0,pct:0,cleared:false,stars:0},b=src.stats[k];
    dst.stats[k]={best:Math.max(a.best||0,b.best||0),plays:Math.max(a.plays||0,b.plays||0),
      pct:Math.max(a.pct||0,b.pct||0),cleared:!!(a.cleared||b.cleared),stars:Math.max(a.stars||0,b.stars||0)};}
}
function createProfile(name,email){
  const id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  profiles[id]={id,name:(name||'Joueur').slice(0,20),email:(email||'').slice(0,60),created:Date.now(),stats:{},history:[]};
  currentId=id;persist();return id;
}
function recordScore(ti,di,score,perfects){
  const key=ti+'|'+di;
  const p=curProfile();
  if(p){const s=p.stats[key]||{best:0,plays:0};s.plays++;if(score>s.best)s.best=score;p.stats[key]=s;
    p.history.unshift({ti,di,score,ts:Date.now()});if(p.history.length>40)p.history.pop();persist();
    if(window.tideFb && window.tideFb.user){ window.tideFb.saveScore(ti,di,s.best,s.plays,s.pct||0,s.cleared||false,s.stars||0).catch(()=>{}); }
  }
  else{if(!sessionBest[key]||score>sessionBest[key])sessionBest[key]=score;}
}
function bestFor(ti,di){const key=ti+'|'+di;const p=curProfile();if(p){const s=p.stats[key];return s?s.best:0;}return sessionBest[key]||0;}
function starsFor(ti,di){const p=curProfile();if(!p)return 0;const s=p.stats[ti+'|'+di];return (s&&s.stars)||0;}
function worldUnlocked(di){if(di<=0)return true;for(let k=0;k<5;k++){if(starsFor(ORDER[k],di-1)<2)return false;}return true;}
function songUnlocked(ti){const k=pos(ti);return k<5 || starsFor(ORDER[k-1],0)>=2;}
function levelUnlocked(ti,di){if(DIFFS[di]&&DIFFS[di].duo)return songUnlocked(ti);return worldUnlocked(di)&&songUnlocked(ti);}
function nextLevel(){
  for(let di=0;di<DIFFS.length;di++){if(DIFFS[di].duo)continue;
    for(let k=0;k<ORDER.length;k++){const ti=ORDER[k];
      if(levelUnlocked(ti,di)&&starsFor(ti,di)<2)return {ti,di};}
  }
  return {ti:ORDER[ORDER.length-1],di:3};
}

/* ================= AUDIO ================= */
let actx,master,lowShelf,comp,delay,delayFb,delaySend,noiseBuf;
const DRIVE_CURVE=(()=>{const n=1024,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=Math.tanh(x*2.3);}return c;})();
function initAudio(){
  if(actx)return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain();master.gain.value=0;
  lowShelf=actx.createBiquadFilter();lowShelf.type='lowshelf';lowShelf.frequency.value=160;lowShelf.gain.value=0;
  comp=actx.createDynamicsCompressor();comp.threshold.value=-12;comp.ratio.value=4;comp.attack.value=.003;comp.release.value=.25;
  master.connect(lowShelf);lowShelf.connect(comp);comp.connect(actx.destination);
  delay=actx.createDelay(0.6);delay.delayTime.value=0.27;
  delayFb=actx.createGain();delayFb.gain.value=0.33;
  delaySend=actx.createGain();delaySend.gain.value=0;
  delaySend.connect(delay);delay.connect(delayFb);delayFb.connect(delay);delay.connect(master);
  const n=actx.sampleRate*0.3;noiseBuf=actx.createBuffer(1,n,actx.sampleRate);
  const d=noiseBuf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
}
function resumeAudio(){initAudio();if(actx.state==='suspended')actx.resume();}
function adsr(g,t,a,peak,rel){g.gain.cancelScheduledValues(t);g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(peak,t+a);g.gain.exponentialRampToValueAtTime(.0001,t+a+rel);}
const A0=27.5;
const note=(semi,oct)=>A0*Math.pow(2,oct+semi/12);
const PENT=[0,3,5,7,10];

function kick(t,g){g=g||1;const o=actx.createOscillator(),ga=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(46,t+.12);
  adsr(ga,t,.004,.95*g,.2);o.connect(ga);ga.connect(master);o.start(t);o.stop(t+.28);}
function hat(t,vel){const s=actx.createBufferSource(),hp=actx.createBiquadFilter(),g=actx.createGain();
  s.buffer=noiseBuf;hp.type='highpass';hp.frequency.value=7400;adsr(g,t,.002,vel,.035);
  s.connect(hp);hp.connect(g);g.connect(master);s.start(t);s.stop(t+.06);}

  g.gain.setValueAtTime(gain,t+dur*.6);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(lp);o2.connect(g2);g2.connect(lp);
  if(drive){const ws=actx.createWaveShaper();ws.curve=DRIVE_CURVE;lp.connect(ws);ws.connect(g);}else{lp.connect(g);}
  g.connect(master);o.start(t);o2.start(t);o.stop(t+dur+.05);o2.stop(t+dur+.05);}

function voc(t,freqs,dur,type,gain){dur=dur||1.2;gain=gain||.3;
  const fm=FORMANTS[type]||FORMANTS.aah;
  const fgains=[1,.55,.32,.16];               // F1 dominant
  const out=actx.createGain();
  out.gain.setValueAtTime(.0001,t);out.gain.exponentialRampToValueAtTime(gain,t+.12);
  out.gain.setValueAtTime(gain,t+Math.max(.15,dur-.5));out.gain.exponentialRampToValueAtTime(.0001,t+dur);
  // vibrato partagé (~5.5 Hz, ±12 cents)
  const lfo=actx.createOscillator(),lfog=actx.createGain();lfo.frequency.value=5.5;lfog.gain.value=12;
  lfo.connect(lfog);lfo.start(t);lfo.stop(t+dur+.1);
  // banc de formants partagé par tous les oscillateurs de l'accord
  const banks=fm.map((ff,i)=>{const bp=actx.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=ff;bp.Q.value=(i===0?7:i===1?9:10);
    const fg=actx.createGain();fg.gain.value=fgains[i];bp.connect(fg);fg.connect(out);return bp;});

    [-7,0,7].forEach(det=>{const o=actx.createOscillator();o.type='sawtooth';o.frequency.value=f;

    const ob=actx.createOscillator();ob.type='sawtooth';ob.frequency.value=f/2; // octave grave, corps
    const obg=actx.createGain();obg.gain.value=.4;lfog.connect(ob.detune);ob.connect(obg);feed(obg);

  const nbp=actx.createBiquadFilter();nbp.type='bandpass';nbp.frequency.value=fm[1];nbp.Q.value=2;
  const ng=actx.createGain();ng.gain.value=.06;ns.connect(nbp);nbp.connect(ng);ng.connect(out);

/* ================= MUSIC STEP ================= */
function playStep(step,t,combo){
  if(step<0){ if((((step%4)+4)%4)===0) hat(t,.4); return; }
  const T=TRACKS[selTrack];
  const beat=Math.floor(step/4), sub=((step%4)+4)%4, sib=(beat%4)*4+sub;
  if(T.kickSteps.indexOf(sib)>=0) kick(t,T.kickGain);
  if(combo>=2 && T.hatSteps.indexOf(sib)>=0) hat(t,T.hatVel*(sub===0?.6:1));
  if(combo>=4){
    const ch=T.prog[Math.floor(beat/2)%T.prog.length];
    for(let k=0;k<T.bassHits.length;k++){
      if(T.bassHits[k][0]===sib){
        const f=ch.bass*T.bassHits[k][1];
        if(T.bassType==='arp') bassPl(t,f,T.bassGain,T.bassDur);
        else subBass(t,f,T.bassGain,T.bassDur,T.bassDrive);
      }
    }
  }
  if(combo>=2 && T.snareSteps && T.snareSteps.indexOf(sib)>=0) snare(t, T.snareVel||.25, T.snareClap);
  if(combo>=4 && T.stabSteps && T.stabSteps.indexOf(sib)>=0){
    const chS=T.prog[Math.floor(beat/2)%T.prog.length]; stab(t, chS.pad, .22, T.stabBright);
  }
  if(T.vocSteps && T.vocSteps.indexOf(sib)>=0 && combo>=(T.lead?4:10)){
    const chV=T.prog[Math.floor(beat/2)%T.prog.length];
    voc(t, chV.pad, spbNow()*2, T.vocType||'aah', T.vocGain||(T.lead?.32:.22));
  }
  if(combo>=10 && sib%8===0 && !T.lead){const ch=T.prog[Math.floor(beat/2)%T.prog.length];pad(t,ch.pad,spbNow()*2);}
  // arpège mélodique (contre-chant) sur les notes de l'accord courant
  if(combo>=14 && (sub===0||sub===2)){
    const chA=T.prog[Math.floor(beat/2)%T.prog.length],tones=chA.pad;
    if(tones&&tones.length){
      const eighth=beat*2+(sub===2?1:0);
      const seq=[0,1,2,1,0,2,1,2];
      const idx=seq[eighth%seq.length]%tones.length;
      const oct=(eighth%8)>=6?2:1;
      pluck(t,tones[idx]*oct,.09,true);
    }
  }
  if(delaySend) delaySend.gain.setTargetAtTime(Math.min(combo/40,1)*.3,t,.2);
}

/* ================= SCHEDULER ================= */
const COUNTIN=4;
let schedTimer=null,sched16=0,schedTime=0,musicOn=false,runSpb=.5;
function startScheduler(){runSpb=game.spb;sched16=-COUNTIN*4;schedTime=game.startTime-COUNTIN*runSpb;musicOn=true;
  schedTimer=setInterval(()=>{if(!musicOn)return;while(schedTime<actx.currentTime+0.12){playStep(sched16,schedTime,game.combo);schedTime+=runSpb/4;sched16++;}},25);}
function stopScheduler(){musicOn=false;if(schedTimer){clearInterval(schedTimer);schedTimer=null;}}

/* preview: ~2 bars at fixed combo */
let previewStop=0;
function previewTrack(i){
  const keep=selTrack;selTrack=i;resumeAudio();applyEQ();applyTrackVisual();
  master.gain.cancelScheduledValues(actx.currentTime);
  master.gain.setValueAtTime(.0001,actx.currentTime);
  master.gain.exponentialRampToValueAtTime(.85,actx.currentTime+.2);
  const spb=spbNow(),start=actx.currentTime+.08;
  for(let s=0;s<32;s++) playStep(s,start+s*spb/4,16);
  master.gain.setTargetAtTime(.0001,start+32*spb/4,.25);

}

/* ================= GAME ================= */
const DEBOUNCE=.09;
const SONG_BARS=10;   // longueur du morceau en mesures (≈45-55 notes) — début/fin nets
const game={state:'menu',startTime:0,spb:.5,lanes:[],
  combo:0,score:0,perfects:0,particles:[],judge:null,shake:0,
  deathT:0,total:0,_tide:0};
function makeLane(baseY){return {nodes:[],genBeat:0,nextNode:0,baseY,trail:[],lastTap:-1};}
function nodeY(lane,b){return lane.baseY+Math.sin(b*.55+1.3)*WAVE_AMP;}
// Génère le morceau ENTIER (composé, fini) : nœud à chaque temps + syncopes croissantes,
// dernière mesure posée (sans syncope) et nœud final sur le temps fort de résolution.
function genSong(lane){
  const D=DIFFS[selDiff],last=SONG_BARS*4;
  lane.nodes=[];lane.genBeat=0;
  for(let b=0;b<=last;b++){
    const adds=[b],inFinalBar=b>=last-4;
    if(b>2 && !inFinalBar){
      const prog=Math.min(b/last,1),dens=D.dens0+(D.densMax-D.dens0)*prog;  // build-up vers la fin
      if(Math.random()<dens)adds.push(b+0.5);
      if(D.sixteenth){const dq=dens*.5;if(Math.random()<dq)adds.push(b+0.25);if(Math.random()<dq)adds.push(b+0.75);}
    }
    adds.sort((x,y)=>x-y);
    for(const bb of adds) lane.nodes.push({beat:bb,y:nodeY(lane,bb)});
  }
}
function verifyTempo(){let bad=0;for(const ln of game.lanes)for(const nd of ln.nodes){if(Math.abs(nd.beat*4-Math.round(nd.beat*4))>1e-6)bad++;}
  if(bad)console.warn('verifyTempo: '+bad+' nœud(s) hors grille');return bad===0;}
function crash(t){const s=actx.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=5000;
  const g=actx.createGain();g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.35,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+1.0);
  s.connect(hp);hp.connect(g);g.connect(master);
  const send=actx.createGain();send.gain.value=.4;g.connect(send);send.connect(delaySend);
  s.start(t);s.stop(t+1.05);}
function riser(t,dur){const s=actx.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  const bp=actx.createBiquadFilter();bp.type='bandpass';bp.Q.value=2;
  bp.frequency.setValueAtTime(300,t);bp.frequency.exponentialRampToValueAtTime(4500,t+dur);
  const g=actx.createGain();g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.12,t+dur*.85);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  s.connect(bp);bp.connect(g);g.connect(master);s.start(t);s.stop(t+dur+.05);}
function startGame(){
  resumeAudio();applyEQ();applyTrackVisual();
  const duo=!!(DIFFS[selDiff]&&DIFFS[selDiff].duo);
  game.state='play';game.combo=0;game.score=0;game.perfects=0;
  game.particles=[];game.judge=null;game.shake=0;game.spb=spbNow();
  game.lanes = duo ? [makeLane(H*0.40), makeLane(H*0.72)] : [makeLane(BASE_Y)];
  for(const ln of game.lanes) genSong(ln);
  game.total=game.lanes.reduce((s,l)=>s+l.nodes.length,0);
  verifyTempo();
  game.startTime=actx.currentTime+COUNTIN*game.spb;
  master.gain.cancelScheduledValues(actx.currentTime);
  master.gain.setValueAtTime(.0001,actx.currentTime);
  master.gain.exponentialRampToValueAtTime(.9,actx.currentTime+.3);
  riser(actx.currentTime, COUNTIN*game.spb);
  startScheduler();
  showScreen(null);
}
function nodeTime(lane,i){return game.startTime+lane.nodes[i].beat*game.spb;}
const curBeat=()=>(actx.currentTime-game.startTime)/game.spb;
function onTap(x){
  if(game.state!=='play')return;
  const now=actx.currentTime;
  let lane=game.lanes[0];
  if(game.lanes.length>1) lane = (x<W/2)?game.lanes[0]:game.lanes[1];
  if(now-lane.lastTap<DEBOUNCE)return;
  lane.lastTap=now;
  const i=lane.nextNode;if(i>=lane.nodes.length)return;
  const tgt=nodeTime(lane,i);
  if(now<tgt-DIFFS[selDiff].good-0.4)return;
  const dt=now-tgt,G=DIFFS[selDiff].good,P=DIFFS[selDiff].perfect;
  if(Math.abs(dt)<=G)success(lane,i,Math.abs(dt)<=P);
  else gameOver();
}
function hitSound(freq,perfect,T){
  const vel=perfect?.4:.3;const v=T.hitVoice||'pluck';const c=actx.currentTime;
  if(v==='bell') bell(c,freq,vel,perfect||T.hitBright);
  else if(v==='piano') pianoNote(c,freq,vel);
  else if(v==='blip') blip(c,freq,vel,perfect||T.hitBright);
  else if(v==='voc') voc(c,[freq],.55,T.hitVoc||'aah',perfect?.34:.28);
  else pluck(c,freq,vel,perfect);
}
function success(lane,i,perfect){
  game.combo++;game.score++;if(perfect)game.perfects++;
  lane.nextNode=i+1;
  const T=TRACKS[selTrack];
  const idx=game.combo%PENT.length,oct=T.pentOct[0]+Math.floor(game.combo/PENT.length)%(T.pentOct[1]-T.pentOct[0]+1);
  hitSound(N(T.keyRoot+PENT[idx],oct),perfect,T);
  burst(CONTACT_X,lane.nodes[i].y,perfect);
  game.judge={txt:perfect?'PERFECT':'GOOD',col:perfect?'#ffd98a':T.accent,t:performance.now()};
  if(perfect)game.shake=Math.min(game.shake+6,10);
  if(game.lanes.every(l=>l.nextNode>=l.nodes.length)) songDone();
}
function recordCompletion(ti,di,score,perfects,pct,stars){
  const key=ti+'|'+di;const p=curProfile();
  if(p){const s=p.stats[key]||{best:0,plays:0,pct:0,cleared:false,stars:0};
    s.plays++;if(score>s.best)s.best=score;
    s.cleared=true;if(pct>(s.pct||0))s.pct=pct;if(stars>(s.stars||0))s.stars=stars;
    p.stats[key]=s;
    p.history.unshift({ti,di,score,ts:Date.now(),pct});if(p.history.length>40)p.history.pop();persist();
    if(window.tideFb&&window.tideFb.user){window.tideFb.saveScore(ti,di,s.best,s.plays,s.pct||0,s.cleared||false,s.stars||0).catch(()=>{});}
  } else {if(!sessionBest[key]||score>sessionBest[key])sessionBest[key]=score;}
}
function songDone(){
  if(game.state!=='play')return;
  game.state='done';game.deathT=actx?actx.currentTime:0;
  stopScheduler();
  if(actx){const T=TRACKS[selTrack],t=actx.currentTime,tonic=T.prog[0].pad;
    pad(t,tonic,1.6);stab(t,tonic,.6,true);crash(t);          // résolution sur la tonique
    master.gain.cancelScheduledValues(t);master.gain.setValueAtTime(master.gain.value||.9,t);
    master.gain.setTargetAtTime(.0001,t+0.9,.45);}            // résonne puis s'éteint
  const pct=Math.round(game.perfects/Math.max(1,game.total)*100);
  const stars=pct>=100?3:pct>=70?2:1;
  recordCompletion(selTrack,selDiff,game.score,game.perfects,pct,stars);

}
function gameOver(){
  if(game.state==='over')return;
  game.state='over';game.deathT=actx?actx.currentTime:0;
  if(actx)failSound(actx.currentTime);stopScheduler();

  recordScore(selTrack,selDiff,game.score,game.perfects);

}
function burst(x,y,perfect){
  const col=perfect?[255,217,138]:ACC,n=perfect?22:12;
  for(let k=0;k<n;k++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*(perfect?5:3.2);
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,col,r:1.5+Math.random()*2.5});}
}
function ballPos(lane,cb){
  const nd=lane.nodes;
  if(!nd.length)return {x:CONTACT_X,y:lane.baseY};
  if(cb<nd[0].beat){const pb=nd[0].beat-1,seg=nd[0].beat-pb,pr=Math.max(0,(cb-pb)/seg);
    const by=nd[0].y;return {x:CONTACT_X,y:by-ARC_H*Math.sin(Math.PI*pr)};}
  let k=0;for(let i=0;i<nd.length-1;i++){if(cb>=nd[i].beat&&cb<nd[i+1].beat){k=i;break;}k=i;}
  const a=nd[k],b=nd[Math.min(k+1,nd.length-1)],seg=Math.max(.0001,b.beat-a.beat);
  const pr=Math.min(1,Math.max(0,(cb-a.beat)/seg)),by=a.y+(b.y-a.y)*pr;
  return {x:CONTACT_X,y:by-ARC_H*Math.sin(Math.PI*pr)*Math.sqrt(seg)};
}

/* ================= RENDER ================= */
function loop(){
  requestAnimationFrame(loop);
  if(mapView){ctx.clearRect(0,0,W,H);drawBg(.35);drawMap();return;}
  const playing=game.state==='play';
  const intensity=playing?Math.min(game.combo/30,1):0;
  let tideTarget=.12;
  if(playing){let done=0;for(const ln of game.lanes)done+=ln.nextNode;tideTarget=game.total?Math.min(done/game.total,1):0;}
  else if(game.state==='done') tideTarget=1;
  else if(game.state==='over') tideTarget=game._tide||0;
  game._tide=(game._tide||0)+(tideTarget-(game._tide||0))*.06;

  if(playing&&actx){for(const ln of game.lanes){const i=ln.nextNode;
    if(i<ln.nodes.length&&actx.currentTime>nodeTime(ln,i)+DIFFS[selDiff].good){gameOver();break;}}}

  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0;if(game.shake>.1){sx=(Math.random()*2-1)*game.shake;sy=(Math.random()*2-1)*game.shake;game.shake*=.85;}
  ctx.save();ctx.translate(sx,sy);
  drawBg(intensity);
  if(actx&&(playing))drawWorld(intensity);
  else drawAmbient();
  drawParticles();
  if(playing)drawHUD();
  ctx.restore();
}
function drawBg(intensity){
  const g=ctx.createLinearGradient(0,0,0,H),lift=intensity*.5;
  g.addColorStop(0,mix('#04141f','#0a3450',lift));g.addColorStop(1,mix('#073049','#0e6e7d',lift));
  ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H+40);
  // SIGNATURE rising tide
  const tl=game._tide||0,level=BASE_Y-tl*(BASE_Y-H*0.06),t=performance.now()/1000;
  const wg=ctx.createLinearGradient(0,level,0,H);
  wg.addColorStop(0,`rgba(${ACC[0]},${ACC[1]},${ACC[2]},${.10+.18*tl})`);
  wg.addColorStop(1,`rgba(${ACC[0]},${ACC[1]},${ACC[2]},${.20+.22*tl})`);
  ctx.fillStyle=wg;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,level);
  for(let x=0;x<=W;x+=18){const y=level+Math.sin(x*.012+t*1.6)*6*(.5+tl)+Math.sin(x*.03-t*2.3)*3;ctx.lineTo(x,y);}
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
}
function drawAmbient(){
  // drifting motes behind menus
  const t=performance.now()/1000;
  for(let i=0;i<14;i++){const x=(i*97+t*16*(i%3+1))%(W+40)-20,y=(i*53+Math.sin(t*.5+i)*30)%H;
    ctx.beginPath();ctx.arc(x,y,1.6+(i%3),0,Math.PI*2);ctx.fillStyle=`rgba(${ACC[0]},${ACC[1]},${ACC[2]},.12)`;ctx.fill();}
}
function drawWorld(intensity){
  const cb=curBeat();
  ctx.beginPath();ctx.moveTo(CONTACT_X,0);ctx.lineTo(CONTACT_X,H);
  ctx.strokeStyle='rgba(234,251,255,.07)';ctx.lineWidth=1;ctx.stroke();
  const duo=game.lanes.length>1;
  game.lanes.forEach((lane,li)=>{
    const col=(duo&&li===1)?[Math.min(ACC[0]+70,255),Math.min(ACC[1]+70,255),Math.min(ACC[2]+70,255)]:ACC;
    const nd=lane.nodes;
    ctx.lineWidth=2.5;ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${.35+.4*intensity})`;
    ctx.beginPath();let started=false;
    for(let i=0;i<nd.length;i++){const nx=CONTACT_X+(nd[i].beat-cb)*BEAT_PX;if(nx<-60)continue;if(nx>W+60)break;
      if(!started){ctx.moveTo(nx,nd[i].y);started=true;}else ctx.lineTo(nx,nd[i].y);}
    ctx.stroke();
    for(let i=0;i<nd.length;i++){const nx=CONTACT_X+(nd[i].beat-cb)*BEAT_PX;if(nx<-30)continue;if(nx>W+30)break;
      const isNext=i===lane.nextNode,isPast=i<lane.nextNode;
      ctx.beginPath();ctx.arc(nx,nd[i].y,isNext?9:6,0,Math.PI*2);
      ctx.fillStyle=isPast?`rgba(${col[0]},${col[1]},${col[2]},.25)`:isNext?'#eafbff':'rgba(234,251,255,.6)';ctx.fill();
      if(isNext){ctx.beginPath();ctx.arc(nx,nd[i].y,20,0,Math.PI*2);
        ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},.7)`;ctx.lineWidth=2;ctx.stroke();}}
    const ball=ballPos(lane,cb);
    lane.trail.push({x:ball.x,y:ball.y});if(lane.trail.length>14)lane.trail.shift();
    for(let k=0;k<lane.trail.length;k++){const p=lane.trail[k],al=k/lane.trail.length;
      ctx.beginPath();ctx.arc(p.x,p.y,9*al,0,Math.PI*2);ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${.25*al})`;ctx.fill();}
    const rg=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,26);
    rg.addColorStop(0,'rgba(234,251,255,.9)');rg.addColorStop(.4,`rgba(${col[0]},${col[1]},${col[2]},.5)`);
    rg.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(ball.x,ball.y,26,0,Math.PI*2);ctx.fill();
    drawSurfer(ball.x,ball.y,SURFER_GAME);
  });
  if(duo){ctx.textAlign='left';ctx.font='600 11px -apple-system,Helvetica,Arial,sans-serif';
    ctx.fillStyle='rgba(234,251,255,.45)';
    ctx.fillText('◐ gauche',10,game.lanes[0].baseY-ARC_H-6);
    ctx.fillText('◑ droite',10,game.lanes[1].baseY-ARC_H-6);
    ctx.strokeStyle='rgba(234,251,255,.06)';ctx.lineWidth=1;ctx.beginPath();
    const midY=(game.lanes[0].baseY+game.lanes[1].baseY)/2;ctx.moveTo(0,midY);ctx.lineTo(W,midY);ctx.stroke();}
}
function drawParticles(){for(let i=game.particles.length-1;i>=0;i--){const p=game.particles[i];
  p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.025;if(p.life<=0){game.particles.splice(i,1);continue;}
  ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
  ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.life})`;ctx.fill();}}
function drawHUD(){
  let done=0;for(const ln of game.lanes)done+=ln.nextNode;
  const prog=game.total?Math.max(0,Math.min(1,done/game.total)):0;
  const bw=W*.6,bx=W*.2,by=H*.06;
  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(bx,by,bw,4);
  ctx.fillStyle=`rgba(${ACC[0]},${ACC[1]},${ACC[2]},.9)`;ctx.fillRect(bx,by,bw*prog,4);
  ctx.textAlign='center';
  ctx.font='600 12px -apple-system,Helvetica,Arial,sans-serif';ctx.fillStyle='rgba(234,251,255,.65)';
  ctx.fillText(TRACKS[selTrack].name+' · '+DIFFS[selDiff].name, W/2, by+22);
  ctx.fillStyle='rgba(234,251,255,.95)';
  ctx.font='700 '+Math.round(Math.min(W*.16,86))+'px -apple-system,Helvetica,Arial,sans-serif';
  ctx.fillText(game.score,W/2,H*.19);
  ctx.font='300 12px -apple-system,Helvetica,Arial,sans-serif';ctx.fillStyle=`rgba(${ACC[0]},${ACC[1]},${ACC[2]},.85)`;
  ctx.fillText('COMBO',W/2,H*.19+20);
  if(pendingChallenge){ctx.font='500 13px -apple-system,Helvetica,Arial,sans-serif';
    ctx.fillStyle=game.score>pendingChallenge.s?'#7CFFB2':'rgba(255,217,138,.9)';
    ctx.fillText('objectif '+pendingChallenge.s+(game.score>pendingChallenge.s?'  — battu ✓':''),W/2,H*.19+42);}
  const cb=curBeat();
  if(cb<0){ctx.font='200 22px -apple-system,Helvetica,Arial,sans-serif';ctx.fillStyle='rgba(234,251,255,.6)';
    ctx.fillText(Math.ceil(-cb),W/2,H*.42);}
  if(game.judge){const age=(performance.now()-game.judge.t)/700;if(age<1){ctx.globalAlpha=1-age;
    ctx.font='600 22px -apple-system,Helvetica,Arial,sans-serif';ctx.fillStyle=game.judge.col;
    ctx.fillText(game.judge.txt,CONTACT_X,BASE_Y-ARC_H-60-age*30);ctx.globalAlpha=1;}}
}

/* ================= UI / SCREENS ================= */
function showScreen(name){
  for(const k in screens)screens[k].classList.toggle('on',k===name);
  if(name)applyTrackVisual();
  $('chip').style.display=(name&&name!=='over')?'flex':'none';
}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);}
function refreshChip(){
  const u = window.tideFb && window.tideFb.user;
  if (u){
    $('chipName').textContent = u.displayName || 'Joueur';
    $('chipAv').textContent = (u.displayName || '?').slice(0,1).toUpperCase();
  } else {
    const p = curProfile();
    $('chipName').textContent = p ? p.name : 'Invité';
    $('chipAv').textContent = (p ? p.name : '?').slice(0,1).toUpperCase();
  }
}
function refreshHome(){
  $('trackName').textContent=TRACKS[selTrack].name;
  $('trackSwatch').style.background=TRACKS[selTrack].accent;
  $('diffName').textContent=DIFFS[selDiff].name;
  $('homeBest').innerHTML='Meilleur&nbsp;<b>'+bestFor(selTrack,selDiff)+'</b>';
  refreshChip();applyTrackVisual();
}
function buildDiffCards(){const c=$('diffCards');c.innerHTML='';DIFFS.forEach((d,i)=>{
  const locked = d.duo ? false : !worldUnlocked(i);
  const el=document.createElement('div');el.className='opt'+(i===selDiff?' sel':'')+(locked?' locked':'');
  let m='';for(let k=0;k<4;k++)m+=`<i class="${k<d.meter?'on':''}"></i>`;
  el.innerHTML=`<div class="dot"></div><div style="flex:1"><div class="ot">${d.name}${locked?' 🔒':''}</div>`+
    `<div class="od">${locked?'Réussis les 5 morceaux gratuits du monde précédent (★★).':d.blurb}</div><div class="meter">${m}</div></div>`;
  if(!locked)el.onclick=()=>{selDiff=i;buildDiffCards();refreshHome();};
  c.appendChild(el);});}
function buildTrackCards(){const c=$('trackCards');c.innerHTML='';ORDER.forEach((i)=>{
  const t=TRACKS[i];
  const locked=!levelUnlocked(i,selDiff);
  const st=starsFor(i,selDiff),stars='★'.repeat(st)+'☆'.repeat(3-st);
  const el=document.createElement('div');el.className='opt'+(i===selTrack?' sel':'')+(locked?' locked':'');
  el.innerHTML=`<div class="dot" style="border-color:${t.accent};${i===selTrack?'background:'+t.accent:''}"></div>
    <div style="flex:1"><div class="ot">${t.name}${locked?' 🔒':''}</div><div class="od">${t.blurb}</div>
      <div class="stars" style="color:var(--gold);letter-spacing:.15em;font-size:13px;margin-top:5px">${stars}</div></div>
    <div class="play"><button class="btn">Aperçu</button></div>`;
  el.onclick=e=>{if(e.target.closest('.play'))return;if(locked){toast('Niveau verrouillé 🔒');return;}selTrack=i;buildTrackCards();refreshHome();};
  el.querySelector('.play .btn').onclick=e=>{e.stopPropagation();previewTrack(i);};
  c.appendChild(el);});}
async function openLeaderboard(){
  const body=$('leaderboardBody');
  $('lbTitle').textContent=`${TRACKS[selTrack].name} · ${DIFFS[selDiff].name}`;
  if(!window.tideFb || !window.tideFb.user){
    body.innerHTML='<div class="note">Connecte-toi avec Google pour voir le classement de tes amis.</div>';
    showScreen('leaderboard'); return;
  }
  body.innerHTML='<div class="note">Chargement…</div>';
  showScreen('leaderboard');
  try{
    const rows=await window.tideFb.friendsLeaderboard(selTrack,selDiff);
    const me=window.tideFb.user.uid;
    if(!rows.length){ body.innerHTML='<div class="note">Aucun ami pour l’instant. Envoie un défi pour relier un ami !</div>'; return; }
    body.innerHTML='<div class="stats">'+rows.map((r,i)=>
      `<div class="r"${r.uid===me?' style="border-color:var(--accent)"':''}><span class="k">${i+1}. ${r.name}${r.uid===me?' (toi)':''}</span><span class="v">${r.best}</span></div>`
    ).join('')+'</div>';
  }catch(e){ body.innerHTML='<div class="note">Erreur de chargement du classement.</div>'; console.warn(e); }
}
async function confirmDeleteAccount(){
  if(!window.tideFb || !window.tideFb.user) return;
  if(!confirm('Supprimer définitivement ton compte et toutes tes données (scores, amitiés) ? Action irréversible.')) return;
  try{
    const uid=window.tideFb.user.uid;
    await window.tideFb.deleteAccount();
    delete profiles['g_'+uid]; currentId=null; ensureLocalProfile();
    refreshHome(); buildProfile(); showScreen('home'); toast('Compte supprimé');
  }catch(e){
    console.warn(e);
    toast('Reconnecte-toi puis réessaie (sécurité)'); // deleteUser exige une connexion récente
  }
}
function buildProfile(){
  const b=$('profileBody');const p=curProfile()||{name:'Invité',stats:{}};
  const u = window.tideFb && window.tideFb.user;
  const name = u ? (u.displayName||'Joueur') : (p.name||'Invité');
  const email = u ? (u.email||'') : (p.email||'');
  let rows='';let any=false;
  TRACKS.forEach((t,ti)=>DIFFS.forEach((d,di)=>{const s=p.stats[ti+'|'+di];
    if(s){any=true;const st=s.stars||0;const stars='★'.repeat(st)+'☆'.repeat(3-st);
      rows+=`<div class="r"><span class="k">${t.name} · ${d.name}</span><span class="v" style="color:var(--gold);font-size:12px">${stars}</span></div>`;}}));
  if(!any)rows='<div class="note">Aucune partie enregistrée pour l’instant. Joue une vague !</div>';
  b.innerHTML=`<div class="brand sm">${name}</div>
    ${email?`<div class="sub">${email}</div>`:''}
    ${u?'<div class="note">✓ Connecté avec Google — progression synchronisée.</div>'
       :'<div class="note">Progression sauvegardée sur cet appareil. Connecte-toi pour la synchroniser partout.</div>'}
    ${!u?'<div class="sp"></div><button class="btn primary wide" id="pfGoogle">Se connecter avec Google</button>':''}
    <div class="stats">${rows}</div>
    <div class="sp"></div>
    <button class="btn wide" id="pfLeaderboard">⚡ Classement d'amis</button>
    ${u?'<div class="sp"></div><button class="btn ghost" id="pfLogout">Se déconnecter</button>'
       +'<div class="sp"></div><button class="btn ghost" id="pfDelete" style="color:#ff8a8a">Supprimer mon compte</button>':''}`;
  const g=b.querySelector('#pfGoogle'); if(g) g.onclick=()=>{
    if(window.tideFb){ toast('Redirection Google…'); window.tideFb.signIn(); } else toast('Firebase indisponible'); };
  b.querySelector('#pfLeaderboard').onclick=()=>openLeaderboard();
  const lo=b.querySelector('#pfLogout'); if(lo) lo.onclick=()=>{ if(window.tideFb){window.tideFb.signOut();} toast('Déconnecté'); };
  const del=b.querySelector('#pfDelete'); if(del) del.onclick=()=>confirmDeleteAccount();
}
function showOver(){
  $('finalScore').textContent=game.score;
  if(pendingChallenge){
    const win=game.score>pendingChallenge.s;
    $('overTitle').textContent='résultat du défi';
    $('overResult').innerHTML=`<div class="result ${win?'win':'lose'}">${win?'défi relevé ✓':'pas cette fois'}</div>`;
    $('overSub').innerHTML=`toi <b>${game.score}</b> &nbsp;·&nbsp; ${pendingChallenge.n} <b>${pendingChallenge.s}</b>`;
    $('challengeFriendBtn').textContent='⚡ Renvoyer un défi';
  }else if(game.state==='done'){
    const pct=Math.round(game.perfects/Math.max(1,game.total)*100);
    const stars=pct>=100?3:pct>=70?2:1;
    const starStr='★'.repeat(stars)+'☆'.repeat(3-stars);
    $('overTitle').textContent=pct>=100?'parfait !':'morceau terminé';
    $('overResult').innerHTML=`<div class="result win">${pct}%</div>`+
      `<div class="row" style="font-size:24px;letter-spacing:.25em;color:var(--gold)">${starStr}</div>`;
    const st=(curProfile()&&curProfile().stats[selTrack+'|'+selDiff])||{};
    $('overSub').innerHTML='meilleur&nbsp;<b>'+(st.pct||pct)+'%</b>';
    $('challengeFriendBtn').textContent='⚡ Défier un ami';
  }else{
    $('overTitle').textContent='la vague s’est brisée';
    $('overResult').innerHTML=(game.perfects?`<div class="row">${game.perfects} perfect</div>`:'');
    const best=bestFor(selTrack,selDiff);
    $('overSub').innerHTML='record&nbsp;<b id="bestScore">'+best+'</b>';
    $('challengeFriendBtn').textContent='⚡ Défier un ami';
  }
  // petit délai anti-clic accidentel sur « Rejouer » juste après la fin
  const rb=$('retryBtn');if(rb){rb.disabled=true;rb.style.opacity='.45';
    setTimeout(()=>{rb.disabled=false;rb.style.opacity='';},900);}
  showScreen('over');
}
function showChallengeShareFallback(text){
  const b=$('challengeBody');
  b.innerHTML=`<div class="brand sm">partage ce défi</div>
    <div class="sub">Copie ce message et envoie-le à un ami.</div>
    <div class="field"><textarea readonly style="width:100%;min-height:120px;background:rgba(0,0,0,.25);
      border:1px solid var(--line);border-radius:12px;color:var(--foam);padding:12px;font-size:14px;-webkit-user-select:text;user-select:text">${text}</textarea></div>`;
  showScreen('challenge');
}
function showIncomingChallenge(c){
  pendingChallenge=c;selTrack=c.ti;selDiff=c.di;refreshHome();
  const b=$('challengeBody');
  b.innerHTML=`<div class="ban">⚡ <b>${c.n}</b> te défie</div>
    <div class="brand sm">bats ${c.s} pts</div>
    <div class="sub">${TRACKS[c.ti].name} · ${DIFFS[c.di].name}</div>
    <div class="sp"></div>
    <button class="btn primary wide" id="acceptCh">Relever le défi</button>`;
  b.querySelector('#acceptCh').onclick=()=>{
    if(c.u && window.tideFb && window.tideFb.user){ window.tideFb.addFriend(c.u, c.dn||c.n).catch(()=>{}); }
    startGame();
  };
  showScreen('challenge');
}
function openPasteChallenge(){
  const b=$('challengeBody');
  b.innerHTML=`<div class="brand sm">colle un code de défi</div>
    <div class="sub">Quelqu’un t’a envoyé un code ? Colle-le ici.</div>
    <div class="field"><input id="chCode" placeholder="code du défi" style="-webkit-user-select:text;user-select:text"></div>
    <div class="sp"></div><button class="btn primary wide" id="chGo">Charger le défi</button>`;
  b.querySelector('#chGo').onclick=()=>{const v=b.querySelector('#chCode').value.trim();
    const c=decC(v.replace(/^.*defi=/,''));
    if(c&&typeof c.s==='number'&&TRACKS[c.ti]&&DIFFS[c.di])showIncomingChallenge(c);else toast('Code invalide');};
  showScreen('challenge');
}

/* ================= INPUT WIRING ================= */
canvas.addEventListener('pointerdown',e=>{e.preventDefault();if(mapView){mapTap(e.clientX,e.clientY);return;}onTap(e.clientX);});
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();onTap(0);}});
$('playBtn').onclick=()=>{pendingChallenge=null;refreshHome();showScreen('free');};
$('freePlayBtn').onclick=()=>{pendingChallenge=null;
  if(!levelUnlocked(selTrack,selDiff)){toast('Niveau verrouillé 🔒');return;}
  startGame();};
$('voyageBtn').onclick=()=>{pendingChallenge=null;openMap();};
$('mapBack').onclick=()=>closeMap();
$('pickTrack').onclick=()=>{buildTrackCards();showScreen('track');};
$('pickDiff').onclick=()=>{buildDiffCards();showScreen('diff');};
$('chip').onclick=()=>{buildProfile();showScreen('profile');};
$('openChallenge').onclick=()=>openPasteChallenge();
$('retryBtn').onclick=()=>startGame();
$('menuBtn').onclick=()=>{pendingChallenge=null;refreshHome();showScreen('home');};
$('challengeFriendBtn').onclick=()=>shareChallenge();
document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{const t=b.getAttribute('data-back')||'home';refreshHome();showScreen(t==='free'?'free':'home');});

/* ================= INIT ================= */
requestAnimationFrame(loop);
(async function init(){
  await loadProfiles();
  if(!currentId) ensureLocalProfile();   // progression locale par défaut
  if(!levelUnlocked(selTrack,selDiff)){const nl=nextLevel();selTrack=nl.ti;selDiff=nl.di;}
  refreshHome();
  // Lier l'état d'auth Firebase au profil courant.
  // Le module firebase.js est différé (chargement CDN) : on l'attend via l'évènement
  // 'tidefb-ready' s'il n'est pas encore prêt au moment de l'init.
  if (window.tideFb) wireAuth();
  else window.addEventListener('tidefb-ready', wireAuth, {once:true});
  const inc=parseIncoming();
  if(inc){showIncomingChallenge(inc);}
  else{showScreen('home');}
  if ('serviceWorker' in navigator) {
    try { await navigator.serviceWorker.register('service-worker.js'); } catch (e) {}
  }
})();
</script>
